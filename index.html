<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cennik klanowy</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="pageShell">
      <div class="pageGlow pageGlowLeft" aria-hidden="true"></div>
      <div class="pageGlow pageGlowRight" aria-hidden="true"></div>

      <header class="wrap hero">
        <div class="heroFrame">
          <div class="heroArt" aria-hidden="true">
            <img class="heroBrand" src="assets/pp-hero.png" alt="" />
          </div>
          <div class="heroCopy">
            <p class="eyebrow">PP marka</p>
            <h1 id="pageTitle">Cennik</h1>
            <p id="pageSubtitle" class="heroSubtitle muted" hidden>Margonem - elity II i herosi</p>
          </div>
          <div class="meta">
            <span class="pill" id="updatedAt" hidden>Aktualizacja: -</span>
            <span class="pill" id="currencyPill" hidden>Waluta: -</span>
          </div>
        </div>
      </header>

      <main class="wrap mainLayout">
        <section class="controlPanel">
          <nav class="tabs" aria-label="Nawigacja">
            <a class="tab" href="#elite2" id="tab-elite2">Elity II</a>
            <a class="tab" href="#heros" id="tab-heros">Herosi</a>
          </nav>

          <section class="controls">
            <label class="field">
              <span class="fieldLabel">Szukaj</span>
              <input id="search" type="search" placeholder="mob / item / lokacja..." autocomplete="off" />
            </label>
            <label class="field">
              <span class="fieldLabel">Sortuj</span>
              <select id="sort">
                <option value="level_asc" selected>Poziom (rosnaco)</option>
                <option value="level_desc">Poziom (malejaco)</option>
                <option value="name">Nazwa (A-Z)</option>
                <option value="drops_desc">Dropy (malejaco)</option>
                <option value="legend_drops_desc">Legendy (ilosc, malejaco)</option>
                <option value="value_desc">Wartosc (suma cen, malejaco)</option>
                <option value="value_asc">Wartosc (suma cen, rosnaco)</option>
              </select>
            </label>
          </section>
        </section>

        <section id="content" class="content" aria-live="polite"></section>

        <footer class="footer muted" hidden></footer>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
